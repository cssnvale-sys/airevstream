name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: airevstream
          POSTGRES_PASSWORD: airevstream_dev
          POSTGRES_DB: airevstream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airevstream"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://airevstream:airevstream_dev@localhost:5432/airevstream
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Build all packages
        run: npx turbo build

      - name: Run unit tests
        run: npx turbo test

      - name: Run audit tests
        run: npx turbo audit
