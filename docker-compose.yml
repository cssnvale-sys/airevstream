version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: airevstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airevstream
      POSTGRES_PASSWORD: airevstream_dev
      POSTGRES_DB: airevstream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: airevstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: airevstream-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: airevstream
      MINIO_ROOT_PASSWORD: airevstream_dev_secret_key_change_me
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
