services:
  postgres:
    image: postgres:16-alpine
    container_name: airevstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airevstream
      POSTGRES_PASSWORD: airevstream_dev
      POSTGRES_DB: airevstream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airevstream"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: airevstream-redis
    command: redis-server --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      # Host port 6389 → container 6379, so we don't clash with Homebrew redis on 6379
      - "6389:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: airevstream-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: airevstream
      MINIO_ROOT_PASSWORD: airevstream_dev_secret_key_change_me
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: airevstream-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 airevstream airevstream_dev_secret_key_change_me;
      mc mb --ignore-existing local/airevstream;
      mc anonymous set download local/airevstream/public;
      echo '{\"CORSRules\":[{\"AllowedOrigins\":[\"http://localhost:3000\",\"http://localhost:3001\",\"http://localhost:3002\",\"http://localhost:3003\",\"http://localhost:3011\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"DELETE\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\",\"Content-Length\",\"Content-Type\"],\"MaxAgeSeconds\":3600}]}' > /tmp/cors.json;
      mc cors set local/airevstream /tmp/cors.json;
      echo 'MinIO bucket and CORS configured.';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
